name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -v

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -m integration tests/integration/ -v -s
        env:
          # GitHub Actions runners are slower than local machines.
          # Increase all timeouts for Docker startup and GMS readiness.
          INTEGRATION_PULL_TIMEOUT: "600"
          INTEGRATION_UP_TIMEOUT: "300"
          INTEGRATION_GMS_TIMEOUT: "300"
