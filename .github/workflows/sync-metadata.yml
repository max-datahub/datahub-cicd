name: Sync Metadata
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without writing to prod"
        type: boolean
        default: true
      include_deletions:
        description: "Detect and propagate soft-deleted governance entities"
        type: boolean
        default: false
      filter_by_source:
        description: "Filter governance entities by provenance source"
        type: choice
        options:
          - all
          - ui
        default: all

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: >
          python -m src.cli.export_cmd
          --output-dir metadata/
          ${{ inputs.include_deletions == true && '--include-deletions' || '' }}
          ${{ inputs.filter_by_source != 'all' && format('--filter-by-source {0}', inputs.filter_by_source) || '' }}
        env:
          DATAHUB_DEV_URL: ${{ secrets.DATAHUB_DEV_URL }}
          DATAHUB_DEV_TOKEN: ${{ secrets.DATAHUB_DEV_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: metadata
          path: metadata/

  sync:
    needs: [export]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: metadata
          path: metadata/
      - run: >
          python -m src.cli.sync_cmd
          --metadata-dir metadata/
          ${{ inputs.dry_run == true && '--dry-run' || '' }}
          ${{ inputs.include_deletions == true && '--apply-deletions' || '' }}
        env:
          DATAHUB_PROD_URL: ${{ secrets.DATAHUB_PROD_URL }}
          DATAHUB_PROD_TOKEN: ${{ secrets.DATAHUB_PROD_TOKEN }}
